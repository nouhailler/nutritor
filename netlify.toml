[build]
  command   = "npx expo export --platform web"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — toutes les routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache long sur les assets hachés (_expo/static/...)
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pas de cache sur index.html (toujours la dernière version)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
